<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>z180-wasm demo</title>
    <style>
      body { max-width: 52rem; margin: 2rem auto; padding: 0 1rem; font: 1rem/1.5 system-ui, sans-serif; }
      fieldset { display: grid; gap: 0.75rem; }
      label { display: grid; gap: 0.25rem; }
      input, button { font: inherit; }
      pre { min-height: 3rem; padding: 0.75rem; overflow: auto; background: #f3f3f3; }
      #status { min-height: 1.5rem; }
    </style>
  </head>
  <body>
    <h1>z180-wasm demo</h1>
    <fieldset>
      <legend>Run a ROM</legend>
      <label>
        ROM file
        <input id="rom" type="file" accept=".bin,.rom,application/octet-stream" required>
      </label>
      <label>
        Cycle budget
        <input id="cycles" type="number" min="1" max="4294967295" step="1" value="1000000">
      </label>
      <button id="run" type="button">Run</button>
    </fieldset>

    <p id="status" role="status"></p>

    <h2>Registers</h2>
    <pre id="registers">Load a ROM to begin.</pre>

    <h2>Serial output</h2>
    <pre id="serial"></pre>

    <script type="module" src="demo.js"></script>
  </body>
</html>
