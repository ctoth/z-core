name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --workspace
